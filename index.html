<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Shopping Cart - 3D Visualization</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for Modern Appearance -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="canvas-container"></div>
    <div class="ui-overlay">
        <header>
            <h1>SmartCart Vision <span class="badge">PROTOTYPE</span></h1>
            <p>Investor Presentation 3D Model</p>
        </header>
        
        <div class="controls">
            <button id="view-front">Front View</button>
            <button id="view-side">Side View</button>
            <button id="view-iso" class="active">3/4 View</button>
        </div>
        
        <div class="features-panel">
            <h3>System Architecture</h3>
            <ul>
                <li>Integrated Touch Tablet System</li>
                <li>Built-in Barcode Scanner</li>
                <li>Weight Sensor Platform</li>
                <li>RFID & Wheel Locks Platform</li>
                <li>Security Camera System</li>
            </ul>
        </div>
    </div>
    
    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Custom 3D Script -->
    <script src="main.js"></script>
</body>
</html>
